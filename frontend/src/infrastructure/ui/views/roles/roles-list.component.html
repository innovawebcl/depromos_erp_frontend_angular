<div class="d-flex align-items-center justify-content-between mb-3">
  <div>
    <h2 class="mb-0">Roles y módulos</h2>
    <div class="text-medium-emphasis small">Configura qué módulos se habilitan por rol.</div>
  </div>
  <div>
    <a class="btn btn-primary" [routerLink]="['/roles/new']">Crear rol</a>
  </div>
</div>

<div class="card">
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover mb-0 align-middle">
        <thead>
          <tr>
            <th style="width: 90px">ID</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Creado</th>
            <th style="width: 160px" class="text-end"></th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let r of roles">
            <td>#{{ r.id }}</td>
            <td class="fw-semibold">{{ r.name }}</td>
            <td class="text-medium-emphasis">{{ r.description || '—' }}</td>
            <td class="small text-medium-emphasis">{{ r.created_at || '' }}</td>
            <td class="text-end">
              <a class="btn btn-sm btn-outline-primary" [routerLink]="['/roles', r.id]">Configurar</a>
            </td>
          </tr>
          <tr *ngIf="!loading && roles.length === 0">
            <td colspan="5" class="text-center py-4 text-medium-emphasis">Sin roles</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
