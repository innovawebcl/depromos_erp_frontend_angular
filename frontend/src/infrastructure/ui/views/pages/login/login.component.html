<div class="login-wrapper min-vh-100 d-flex flex-row align-items-center">
  <c-container breakpoint="md">
    <c-row class="justify-content-center">
      <c-col lg="10" xl="8">
        <c-card-group>
          <!-- Formulario de Login -->
          <c-card class="login-card p-4">
            <c-card-body>
              <div class="text-center mb-4">
                <h2 class="text-primary mb-1">
                  Bienvenido a <span style="color: #f57c00;">Depromos</span> ERP
                </h2>
                <p class="text-muted small">
                  Ingresa tus credenciales para acceder al panel de administración.
                </p>
              </div>

              <app-form
                (formSubmit)="onSubmit($event)"
                [isLoading]="isLoading"
              ></app-form>
            </c-card-body>
          </c-card>

          <!-- Panel Lateral con Logo -->
          <c-card
            [ngStyle]="{ 'minWidth.%': 44 }"
            class="login-brand-panel text-white py-5 d-none d-md-flex"
          >
            <c-card-body
              class="text-center d-flex flex-column justify-content-center align-items-center"
            >
              <img
                [src]="logo"
                alt="Depromos"
                class="d-block mx-auto mb-3"
                style="max-width: 220px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));"
                loading="lazy"
              />
              <p class="text-white-50 small mt-2 mb-0">
                Panel de Administración
              </p>
            </c-card-body>
          </c-card>
        </c-card-group>
      </c-col>
    </c-row>
  </c-container>
</div>
