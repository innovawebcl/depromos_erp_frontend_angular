<form
  cForm
  novalidate
  [formGroup]="codeForm"
  (ngSubmit)="onSubmit()"
  class="g-3 needs-validation"
>
  <c-col md="12">
    <div class="mb-3">
        <app-code-input formControlName="verificationCode"></app-code-input>
    </div>
  </c-col>


  <c-col xs="6" [offset]="{ xs: 8 }">
    <button
      cButton
      class="me-1"
      style="
        background-color: #fd7607;
        color: white;
        border: none;
        outline: none;
      "
      type="submit"
      [disabled]="(isLoading | async) || codeForm.invalid"
    >
      <ng-container *ngIf="isLoading | async; else showText">
        <c-spinner aria-hidden="true" size="sm"></c-spinner>
      </ng-container>
      <ng-template #showText>Validar código</ng-template>
    </button>
  </c-col>
</form>
