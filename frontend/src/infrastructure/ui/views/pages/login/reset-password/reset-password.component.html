<form
  cForm
  novalidate
  [formGroup]="resetPasswordForm"
  (ngSubmit)="onSubmit()"
  class="g-3 needs-validation"
>
  <div *ngIf="error" class="alert alert-danger text-center">
    {{ error }}
  </div>

  <c-col md="12">
    <div class="mb-3">
      <label cLabel for="password">Contraseña</label>
      <c-input-group class="has-validation">
        <span cInputGroupText id="password-span">
          <svg cIcon name="cilLockLocked"></svg>
        </span>
        <input
          cFormControl
          class="is-invalid"
          formControlName="password"
          placeholder="*************"
          aria-describedby="password-span"
          id="password"
          type="password"
          [disabled]="isLoading | async"
          [ngClass]="{
            'is-invalid':
            resetPasswordForm.get('password')?.invalid && resetPasswordForm.get('password')?.touched
          }"
        />
      </c-input-group>
    </div>
  </c-col>

  <c-col md="12">
    <div class="mb-3">
      <label cLabel for="confirmPassword">Contraseña</label>
      <c-input-group class="has-validation">
        <span cInputGroupText id="confirmPassword-span">
          <svg cIcon name="cilLockLocked"></svg>
        </span>
        <input
          cFormControl
          class="is-invalid"
          formControlName="confirmPassword"
          placeholder="*************"
          aria-describedby="confirmPassword-span"
          id="confirmPassword"
          type="password"
          [disabled]="isLoading | async"
          [ngClass]="{
            'is-invalid':
            resetPasswordForm.get('confirmPassword')?.invalid && resetPasswordForm.get('confirmPassword')?.touched
          }"
        />
      </c-input-group>
    </div>
  </c-col>

  <c-col xs="6" [offset]="{ xs: 8 }">
    <button
      cButton
      class="me-1"
      style="
        background-color: #fd7607;
        color: white;
        border: none;
        outline: none;
      "
      type="submit"
      [disabled]="isLoading | async"
    >
      <ng-container *ngIf="isLoading | async; else showText">
        <c-spinner aria-hidden="true" size="sm"></c-spinner>
      </ng-container>
      <ng-template #showText> Ingresar </ng-template>
    </button>
  </c-col>
</form>
