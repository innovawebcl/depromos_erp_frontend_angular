<c-row>
  <c-col [xl]="12">
    <c-row>
      <c-col [sm]="6" *ngIf="dashboard">
        <c-container *ngIf="dashboard.annotations.length === 0" style="border-bottom: 1px solid lightgrey">
          <c-widget-stat-c title="Sin registro de anotaciones" class="mb-4" value="0">
            <ng-template cTemplateId="widgetIconTemplate">
              <svg cIcon height="26" name="cil-chart"></svg>
            </ng-template>
            <ng-template cTemplateId="widgetProgressTemplate">
              <c-progress class="mt-3 mb-0" thin value="0" color="primary" />
            </ng-template>
          </c-widget-stat-c>
        </c-container>
        <c-card class="mb-4 p-3 container-pointer" *ngIf="dashboard.annotations.length > 0"
          (click)="navigateToProfile()">
          <div class="d-flex justify-content-between">
            <h5 cCardTitle class="text-body-secondary text-truncate">
              Anotaciones
            </h5>
          </div>
          <c-card-body>
            <c-container *ngFor="let dash of dashboard.annotations" style="border-bottom: 1px solid lightgrey">
              <c-widget-stat-c [title]="dash.type | translateAnnotation" class="mb-4" [value]="dash.total">
                <ng-template cTemplateId="widgetIconTemplate">
                  <svg cIcon height="26" name="cil-chart"></svg>
                </ng-template>
                <ng-template cTemplateId="widgetProgressTemplate">
                  <c-progress class="mt-3 mb-0" thin [value]="dash.total" color="primary" />
                </ng-template>
              </c-widget-stat-c>
            </c-container>
          </c-card-body>
        </c-card>
      </c-col>
      <c-col [sm]="6">
        <c-card class="mb-4">
          <c-card-body class="container-pointer" *ngIf="dashboard" (click)="navigateToPositiveReinforcements()">
            <div class="d-flex justify-content-between">
              <h6 cCardTitle class="text-body-secondary text-truncate">
                Referencias Positivas
              </h6>
              <div class="bg-primary bg-opacity-25 text-primary rounded p-2 ms-2">
                <svg cIcon name="cil-check" size="xl"></svg>
              </div>
            </div>
            <div class="fs-4 fw-semibold pb-3">
              {{ dashboard.positive_reinforcement }}
            </div>
          </c-card-body>
        </c-card>

        <c-card class="mb-4">
          <c-card-body class="container-pointer" *ngIf="dashboard" (click)="navigateToComplaints()">
            <div class="d-flex justify-content-between">
              <h6 cCardTitle class="text-body-secondary text-truncate">
                Mis denuncias
              </h6>
              <div class="bg-primary bg-opacity-25 text-primary rounded p-2 ms-2">
                <svg cIcon name="cil-check" size="xl"></svg>
              </div>
            </div>
            <div class="fs-4 fw-semibold pb-3">
              {{ dashboard.complaints }}
            </div>
          </c-card-body>
        </c-card>
      </c-col>
    </c-row>
  </c-col>
</c-row>
