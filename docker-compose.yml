version: '3.9'

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: backoffice
      MYSQL_USER: backoffice
      MYSQL_PASSWORD: backoffice
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "33066:3306"
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - db_data:/var/lib/mysql

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: backoffice
      DB_USERNAME: backoffice
      DB_PASSWORD: backoffice
    ports:
      - "8080:80"
    depends_on:
      - db

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      API_URL: http://localhost:8080/api
    ports:
      - "4200:4200"
    depends_on:
      - api

volumes:
  db_data:
