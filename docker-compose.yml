# =============================================================================
# Depromos ERP Frontend - Docker Compose (Desarrollo Local)
# Para desarrollo standalone del frontend con hot-reload
#
# Uso:
#   docker compose up --build
#
# Nota: Para el stack completo (frontend + backend + mysql),
#       usar el docker-compose.yml del repositorio backend.
# =============================================================================

services:

  # --- Frontend Dev Server (Angular CLI con hot-reload) ---
  web-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: depromos-web-dev
    environment:
      NODE_ENV: development
    ports:
      - "4200:4200"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/angular.json:/app/angular.json
    command: ["npx", "ng", "serve", "--host", "0.0.0.0", "--port", "4200", "--poll", "2000"]
